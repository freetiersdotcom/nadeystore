site:
  name: Nadey Naturel
  site: 'https://nadeynaturel.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

metadata:
  title:
    default: Nadey Naturel
    template: '%s — Nadey Naturel'
  description: "Produits de santé naturelle à base de plantes d'Afrique de l'Ouest. Moringa, gingembre, baobab — livrés à la diaspora partout en Europe."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Nadey Naturel
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@nadeynaturel'
    site: '@nadeynaturel'
    cardType: summary_large_image

i18n:
  language: fr
  textDirection: ltr

apps:
  blog:
    isEnabled: false

analytics:
  vendors:
    googleAnalytics:
      id: ~

ui:
  theme: 'system'
